name: Continuous Founder Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: continuous-founder-cycle
  cancel-in-progress: false

jobs:
  operate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      models: read
    steps:
      - name: Check out current state
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify runtime before external execution
        run: python3 -m unittest discover -s tests

      - name: Scan, synthesize, decide, and execute bounded scope
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/run_continuous_founder.py

      - name: Refresh public interest counts
        run: python3 scripts/refresh_commercial_funnel.py

      - name: Verify generated state
        run: python3 -m unittest discover -s tests

      - name: Commit audited public state
        run: |
          git config user.name "Autonomous Founder Agent"
          git config user.email "actions@users.noreply.github.com"
          git add AGENT_MANIFEST.json config/capability_grants.json data docs/CURRENT_CYCLE.md docs/LATEST_DISCOVERY.md docs/REVENUE_LEDGER.md site/opportunities
          if git diff --cached --quiet; then
            echo "No founder-state changes to commit."
          else
            git commit -m "chore: run bounded founder cycle [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the exact operated state
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    needs: operate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy operated state to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
